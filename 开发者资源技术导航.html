<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevNav - 开发者资源导航</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        :root{
            --bg:#fff;--card:#f5f5f7;--border:#d2d2d7;--text:#1d1d1f;--muted:#86868b;
            --hover:#e8e8ed;--active:#0071e3;--shadow:rgba(0,0,0,.04);
        }
        body{font-family:-apple-system,BlinkMacSystemFont,'SF Pro Display','PingFang SC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}

        /* 入场遮罩 */
        .loader{position:fixed;top:0;left:0;right:0;bottom:0;background:var(--bg);z-index:9999;display:flex;align-items:center;justify-content:center;transition:opacity .6s cubic-bezier(.4,0,.2,1),visibility .6s}
        .loader.hidden{opacity:0;visibility:hidden}
        .loader-grid{display:grid;grid-template-columns:repeat(8,60px);gap:8px}
        .loader-cell{width:60px;height:60px;background:var(--card);border-radius:12px;transform:translateY(-100vh);animation:slideDown .8s cubic-bezier(.4,0,.2,1) forwards}
        .loader-cell:nth-child(1){animation-delay:0s}.loader-cell:nth-child(2){animation-delay:.05s}.loader-cell:nth-child(3){animation-delay:.1s}.loader-cell:nth-child(4){animation-delay:.15s}
        .loader-cell:nth-child(5){animation-delay:.2s}.loader-cell:nth-child(6){animation-delay:.25s}.loader-cell:nth-child(7){animation-delay:.3s}.loader-cell:nth-child(8){animation-delay:.35s}
        .loader-cell:nth-child(9){animation-delay:.02s}.loader-cell:nth-child(10){animation-delay:.07s}.loader-cell:nth-child(11){animation-delay:.12s}.loader-cell:nth-child(12){animation-delay:.17s}
        .loader-cell:nth-child(13){animation-delay:.22s}.loader-cell:nth-child(14){animation-delay:.27s}.loader-cell:nth-child(15){animation-delay:.32s}.loader-cell:nth-child(16){animation-delay:.37s}
        .loader-cell:nth-child(17){animation-delay:.04s}.loader-cell:nth-child(18){animation-delay:.09s}.loader-cell:nth-child(19){animation-delay:.14s}.loader-cell:nth-child(20){animation-delay:.19s}
        .loader-cell:nth-child(21){animation-delay:.24s}.loader-cell:nth-child(22){animation-delay:.29s}.loader-cell:nth-child(23){animation-delay:.34s}.loader-cell:nth-child(24){animation-delay:.39s}
        @keyframes slideDown{to{transform:translateY(0)}}

        /* 导航 */
        .navbar{padding:16px 32px;background:var(--bg);position:sticky;top:0;z-index:100;backdrop-filter:blur(20px) saturate(180%);-webkit-backdrop-filter:blur(20px) saturate(180%);border-bottom:1px solid var(--border)}
        .navbar-inner{max-width:1200px;margin:0 auto;display:flex;align-items:center;justify-content:space-between}
        .logo{font-size:21px;font-weight:600;letter-spacing:-.5px;color:var(--text)}
        .nav-links{display:flex;gap:32px}
        .nav-links a{font-size:14px;color:var(--muted);text-decoration:none;transition:color .3s cubic-bezier(.4,0,.2,1);position:relative}
        .nav-links a::after{content:'';position:absolute;bottom:-4px;left:0;right:0;height:1px;background:var(--active);transform:scaleX(0);transition:transform .3s cubic-bezier(.4,0,.2,1)}
        .nav-links a:hover{color:var(--text)}
        .nav-links a:hover::after{transform:scaleX(1)}

        /* Hero */
        .hero{padding:100px 32px 60px;text-align:center;max-width:800px;margin:0 auto}
        .hero h1{font-size:56px;font-weight:700;letter-spacing:-2px;margin-bottom:16px;opacity:0;animation:fadeIn .8s cubic-bezier(.4,0,.2,1) .5s forwards}
        .hero p{font-size:21px;color:var(--muted);line-height:1.5;opacity:0;animation:fadeIn .8s cubic-bezier(.4,0,.2,1) .6s forwards}
        @keyframes fadeIn{to{opacity:1}}

        /* 搜索 */
        .search{max-width:500px;margin:0 auto 60px;padding:0 32px;opacity:0;animation:fadeIn .8s cubic-bezier(.4,0,.2,1) .7s forwards}
        .search-box{position:relative}
        .search input{width:100%;padding:16px 24px 16px 48px;border:none;border-radius:24px;background:var(--card);border:1px solid var(--border);color:var(--text);font-size:16px;transition:all .4s cubic-bezier(.4,0,.2,1)}
        .search input:focus{outline:none;border-color:var(--active);box-shadow:0 0 0 4px rgba(0,113,227,.1),0 8px 32px var(--shadow)}
        .search-icon{position:absolute;left:18px;top:50%;transform:translateY(-50%);width:20px;height:20px;color:var(--muted)}

        /* 分类标签 */
        .tabs{max-width:1200px;margin:0 auto 40px;padding:0 32px;display:flex;gap:8px;flex-wrap:wrap;opacity:0;animation:fadeIn .8s cubic-bezier(.4,0,.2,1) .8s forwards}
        .tab{padding:10px 20px;border-radius:20px;background:var(--card);border:1px solid var(--border);font-size:14px;color:var(--muted);cursor:pointer;transition:all .3s cubic-bezier(.4,0,.2,1);user-select:none}
        .tab:hover{background:var(--hover);color:var(--text)}
        .tab.active{background:var(--active);color:#fff;border-color:var(--active)}

        /* 容器 */
        .container{max-width:1200px;margin:0 auto;padding:0 32px 100px;position:relative}

        /* 滑块网格框架动效 */
        .slider-grid{position:relative;padding:24px;background:transparent;border-radius:24px;transition:all .5s cubic-bezier(.4,0,.2,1)}
        .slider-grid::before{content:'';position:absolute;inset:0;border-radius:24px;border:1px solid transparent;transition:all .5s cubic-bezier(.4,0,.2,1)}
        .slider-grid.switching{padding:28px 24px;background:rgba(0,113,227,.02)}
        .slider-grid.switching::before{border-color:rgba(0,113,227,.08);box-shadow:0 0 60px rgba(0,113,227,.04)}
        .grid-indicator{position:absolute;top:12px;left:24px;display:flex;align-items:center;gap:8px;font-size:11px;color:var(--muted);opacity:0;transform:translateX(-10px);transition:all .4s cubic-bezier(.4,0,.2,1)}
        .slider-grid.switching .grid-indicator{opacity:1;transform:translateX(0)}
        .grid-dot{width:6px;height:6px;border-radius:50%;background:var(--active);animation:pulse 1s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

        /* 滑块网格 */
        .slider-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:16px;position:relative}
        .slider{position:relative;height:200px;border-radius:20px;background:var(--card);border:1px solid var(--border);overflow:hidden;cursor:pointer;transition:all .5s cubic-bezier(.4,0,.2,1);transform-origin:center}
        .slider-track{position:absolute;top:0;left:0;right:0;height:100%;background:linear-gradient(180deg,var(--hover) 0%,var(--card) 100%);transform:translateY(-100%);transition:transform .6s cubic-bezier(.4,0,.2,1)}
        .slider:hover .slider-track{transform:translateY(0)}
        .slider-content{position:absolute;top:0;left:0;right:0;padding:20px;height:100%;display:flex;flex-direction:column;justify-content:space-between;z-index:1}
        .slider-header{display:flex;align-items:center;gap:12px}
        .slider-icon{width:44px;height:44px;border-radius:12px;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:700;color:var(--active);transition:all .4s cubic-bezier(.4,0,.2,1)}
        .slider:hover .slider-icon{background:var(--active);color:#fff;transform:scale(1.1)}
        .slider-title{font-size:15px;font-weight:600;color:var(--text);line-height:1.3}
        .slider-desc{font-size:13px;color:var(--muted);line-height:1.4;flex:1;overflow:hidden}
        .slider-link{position:absolute;top:0;left:0;right:0;bottom:0;z-index:2}
        .slider-tags{display:flex;gap:6px;flex-wrap:wrap}
        .slider-tag{font-size:10px;padding:3px 8px;border-radius:6px;background:rgba(0,113,227,.1);color:var(--active);transition:all .3s}
        .slider:hover .slider-tag{background:var(--active);color:#fff}
        .slider-badges{display:flex;gap:4px;margin-top:4px}
        .slider-badge{font-size:9px;padding:2px 6px;border-radius:4px;font-weight:500}
        .badge-popular{background:#fef3c7;color:#92400e}.badge-new{background:#dbeafe;color:#1e40af}.badge-hot{background:#fee2e2;color:#991b1b}

        /* 滑块动画 */
        .slider{opacity:0;transform:translateY(30px) scale(0.95)}
        .slider.show{animation:sliderIn .5s cubic-bezier(.4,0,.2,1) forwards}
        .slider.hide{animation:sliderOut .3s cubic-bezier(.4,0,.2,1) forwards}
        @keyframes sliderIn{to{opacity:1;transform:translateY(0) scale(1)}}
        @keyframes sliderOut{to{opacity:0;transform:translateY(-20px) scale(0.95)}}

        /* 分类计数 */
        .cat-count{font-size:12px;color:var(--muted);margin-left:8px;font-weight:400}

        /* Tooltip */
        .tooltip{position:fixed;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:0;max-width:380px;box-shadow:0 25px 80px rgba(0,0,0,.15);z-index:1000;opacity:0;transform:scale(.85) translateY(15px);pointer-events:none;transition:all .4s cubic-bezier(.4,0,.2,1);overflow:hidden}
        .tooltip.visible{opacity:1;transform:scale(1) translateY(0)}
        .tooltip-header{padding:20px 20px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:14px}
        .tooltip-icon{width:48px;height:48px;border-radius:14px;background:var(--card);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:var(--active)}
        .tooltip-title{font-size:17px;font-weight:600;color:var(--text)}
        .tooltip-tags{display:flex;gap:6px;margin-top:6px;flex-wrap:wrap}
        .tooltip-tag{font-size:11px;padding:4px 10px;border-radius:8px;background:var(--card);color:var(--muted)}
        .tooltip-body{padding:16px 20px}
        .tooltip-desc{font-size:14px;color:var(--text);line-height:1.6;margin-bottom:14px}
        .tooltip-meta{display:grid;grid-template-columns:1fr 1fr;gap:10px}
        .tooltip-meta-item{background:var(--card);padding:10px 12px;border-radius:10px}
        .tooltip-meta-label{font-size:10px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
        .tooltip-meta-value{font-size:13px;color:var(--text);font-weight:500}
        .tooltip-related{padding:12px 20px;border-top:1px solid var(--border)}
        .tooltip-related-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px}
        .tooltip-related-items{display:flex;gap:6px;flex-wrap:wrap}
        .tooltip-related-item{font-size:12px;padding:5px 10px;border-radius:8px;background:var(--card);color:var(--text);transition:all .2s;cursor:pointer}
        .tooltip-related-item:hover{background:var(--active);color:#fff}
        .tooltip-similar{background:rgba(0,113,227,.03)}
        .tooltip-uses{padding:10px 20px;border-top:1px solid var(--border);background:rgba(0,0,0,.02)}
        .tooltip-uses-title{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px}
        .tooltip-uses-list{display:flex;gap:6px;flex-wrap:wrap}
        .tooltip-use-tag{font-size:11px;padding:4px 8px;border-radius:6px;background:var(--hover);color:var(--text)}
        .tooltip-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
        .tooltip-links{display:flex;gap:12px}
        .tooltip-link{font-size:12px;color:var(--active);text-decoration:none;display:flex;align-items:center;gap:4px}
        .tooltip-link:hover{text-decoration:underline}

        /* Footer */
        .footer{text-align:center;padding:60px 32px;color:var(--muted);font-size:13px;border-top:1px solid var(--border)}
        .footer a{color:var(--active);text-decoration:none}

        /* 响应式 */
        @media(max-width:768px){
            .hero h1{font-size:36px}.hero p{font-size:17px}
            .slider-grid{grid-template-columns:1fr}
            .nav-links{display:none}
            .loader-grid{grid-template-columns:repeat(4,50px)}
            .loader-cell{width:50px;height:50px}
            .tooltip{max-width:calc(100vw - 32px);right:16px!important;left:16px!important}
            .tooltip-meta{grid-template-columns:1fr}
        }
    </style>
</head>

// 更新分类计数
function updateCounts(){
    const counts = {};
    resources.forEach(r => counts[r.cat] = (counts[r.cat]||0) + 1);
    document.querySelectorAll('.tab').forEach(tab => {
        const cat = tab.dataset.tab;
        const count = tab.querySelector('.cat-count');
        count.textContent = cat === 'all' ? `(${resources.length})` : `(${counts[cat]||0})`;
    });
}

// 渲染滑块
function renderSliders(filterCat='all',search=''){
    const grid = document.getElementById('grid');
    const oldSliders = grid.querySelectorAll('.slider');
    
    // 底层框架切换动效
    grid.classList.add('switching');
    const indicator = grid.querySelector('.grid-indicator');
    const gridText = grid.querySelector('.grid-text');
    if(gridText) gridText.textContent = filterCat === 'all' ? '全部资源' : getCatName(filterCat) + ' 中...';
    
    // 淡出旧滑块
    oldSliders.forEach(s => s.classList.add('hide'));
    
    setTimeout(() => {
        grid.innerHTML = '<div class="grid-indicator"><span class="grid-dot"></span><span class="grid-text">加载中...</span></div>';
        
        let delay = 0;
        let count = 0;
        resources.forEach(r => {
            if(filterCat !== 'all' && r.cat !== filterCat) return;
            if(search && !r.title.toLowerCase().includes(search) && !r.desc.toLowerCase().includes(search)) return;
            
            count++;
            const el = document.createElement('div');
            el.className = 'slider';
            el.dataset.cat = r.cat;
            el.dataset.title = r.title;
            el.dataset.desc = r.desc;
            el.dataset.detail = r.docs;
            el.dataset.tags = r.tags.join(',');
            el.dataset.lang = r.lang;
            el.dataset.license = r.license;
            el.dataset.related = r.related.join(',');
            el.dataset.similar = r.similar ? r.similar.join(',') : '';
            el.dataset.uses = r.uses ? r.uses.join(',') : '';
            el.dataset.stars = r.stars || '';
            el.dataset.homepage = r.homepage || '';
            
            let badges = '';
            if(r.badge === 'popular') badges += '<span class="slider-badge badge-popular">热门</span>';
            else if(r.badge === 'new') badges += '<span class="slider-badge badge-new">新</span>';
            else if(r.badge === 'hot') badges += '<span class="slider-badge badge-hot">热</span>';
            
            el.innerHTML = `
                <div class="slider-track"></div>
                <div class="slider-content">
                    <div>
                        <div class="slider-header">
                            <div class="slider-icon">${r.icon}</div>
                            <div class="slider-title">${r.title}</div>
                        </div>
                        ${badges ? `<div class="slider-badges">${badges}</div>` : ''}
                        <div class="slider-desc">${r.desc}</div>
                    </div>
                    <div class="slider-tags">${r.tags.map(t=>`<span class="slider-tag">${t}</span>`).join('')}</div>
                </div>
                <a href="${r.docs}" target="_blank" class="slider-link"></a>
            `;
            
            grid.appendChild(el);
            
            // 交错动画
            setTimeout(() => el.classList.add('show'), delay);
            delay += 60;
        });
        
        // 更新框架动效状态
        setTimeout(() => {
            grid.classList.remove('switching');
            const ind = grid.querySelector('.grid-indicator');
            if(ind) ind.remove();
        }, 300);
        
        initTooltip();
    }, oldSliders.length ? 300 : 0);
}

function getCatName(cat){
    const names = {ai:'AI / LLM',crawler:'爬虫',frontend:'前端',backend:'后端',devops:'运维',security:'安全',tools:'工具',docs:'文档',design:'设计',data:'数据',mobile:'移动端'};
    return names[cat] || cat;
}

// 搜索过滤
function filter(kw){
    const activeTab = document.querySelector('.tab.active');
    const cat = activeTab ? activeTab.dataset.tab : 'all';
    renderSliders(cat, kw.toLowerCase());
}

// 分类切换
document.querySelectorAll('.tab').forEach(tab => {
    tab.addEventListener('click', function(){
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        this.classList.add('active');
        renderSliders(this.dataset.tab);
    });
});

// 导航链接
document.querySelectorAll('.nav-links a').forEach(a => {
    a.addEventListener('click', function(e){
        e.preventDefault();
        const tab = this.dataset.tab;
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === tab));
        renderSliders(tab);
    });
});

// Tooltip
let activeSlider = null;
const tooltip = document.getElementById('tooltip');

function initTooltip(){
    document.querySelectorAll('.slider').forEach(slider => {
        slider.addEventListener('click', function(e){
            if(e.target.classList.contains('slider-link')) return;
            e.preventDefault();
            activeSlider = activeSlider === this ? null : this;
            if(activeSlider === this){
                this.style.borderColor = 'var(--active)';
                this.style.boxShadow = '0 12px 40px rgba(0,113,227,.15)';
            } else {
                this.style.borderColor = '';
                this.style.boxShadow = '';
            }
        });
        
        slider.addEventListener('mouseenter', function(e){
            if(activeSlider !== this) return;
            showTooltip(this, e);
        });
        
        slider.addEventListener('mousemove', function(e){
            if(activeSlider === this) updateTooltipPos(e);
        });
        
        slider.addEventListener('mouseleave', function(){
            tooltip.classList.remove('visible');
        });
    });
}

function showTooltip(slider, e){
    const r = resources.find(x => x.title === slider.dataset.title) || {};
    const relatedHtml = r.related ? r.related.map(t => `<span class="tooltip-related-item" data-action="related">${t}</span>`).join('') : '';
    const similarHtml = r.similar ? r.similar.map(t => `<span class="tooltip-related-item" data-action="similar">${t}</span>`).join('') : '';
    const usesHtml = r.uses ? r.uses.map(t => `<span class="tooltip-use-tag">${t}</span>`).join('') : '';
    
    tooltip.innerHTML = `
        <div class="tooltip-header">
            <div class="tooltip-icon">${r.icon || ''}</div>
            <div>
                <div class="tooltip-title">${slider.dataset.title}</div>
                <div class="tooltip-tags">${r.tags ? r.tags.map(t=>`<span class="tooltip-tag">${t}</span>`).join('') : ''}</div>
            </div>
        </div>
        <div class="tooltip-body">
            <div class="tooltip-desc">${r.desc || slider.dataset.desc}</div>
            ${usesHtml ? `<div class="tooltip-uses"><div class="tooltip-uses-title">使用场景</div><div class="tooltip-uses-list">${usesHtml}</div></div>` : ''}
            <div class="tooltip-meta">
                <div class="tooltip-meta-item">
                    <div class="tooltip-meta-label">语言</div>
                    <div class="tooltip-meta-value">${r.lang || '-'}</div>
                </div>
                <div class="tooltip-meta-item">
                    <div class="tooltip-meta-label">协议</div>
                    <div class="tooltip-meta-value">${r.license || '-'}</div>
                </div>
                ${r.stars ? `<div class="tooltip-meta-item">
                    <div class="tooltip-meta-label">GitHub</div>
                    <div class="tooltip-meta-value">${r.stars}</div>
                </div>` : ''}
            </div>
        </div>
        ${relatedHtml ? `
        <div class="tooltip-related">
            <div class="tooltip-related-title">关联资源</div>
            <div class="tooltip-related-items">${relatedHtml}</div>
        </div>` : ''}
        ${similarHtml ? `
        <div class="tooltip-related tooltip-similar">
            <div class="tooltip-related-title">替代方案</div>
            <div class="tooltip-related-items">${similarHtml}</div>
        </div>` : ''}
        <div class="tooltip-footer">
            <div class="tooltip-links">
                ${r.docs ? `<a href="${r.docs}" target="_blank" class="tooltip-link">[文档]</a>` : ''}
                ${r.github ? `<a href="${r.github}" target="_blank" class="tooltip-link">[GitHub]</a>` : ''}
                ${r.homepage ? `<a href="${r.homepage}" target="_blank" class="tooltip-link">[官网]</a>` : ''}
            </div>
        </div>
    `;
    
    tooltip.classList.add('visible');
    updateTooltipPos(e);
    
    // 点击相关资源跳转
    tooltip.querySelectorAll('.tooltip-related-item').forEach(item => {
        item.addEventListener('click', () => {
            const keyword = item.textContent;
            activeSlider = null;
            document.querySelectorAll('.slider').forEach(s => {
                s.style.borderColor = '';
                s.style.boxShadow = '';
            });
            // 搜索包含该关键词的资源
            filter(keyword);
        });
    });
}

function updateTooltipPos(e){
    const x = e.clientX + 16;
    const y = e.clientY + 16;
    const maxX = window.innerWidth - tooltip.offsetWidth - 16;
    const maxY = window.innerHeight - tooltip.offsetHeight - 16;
    tooltip.style.left = Math.min(x, maxX) + 'px';
    tooltip.style.top = Math.min(y, maxY) + 'px';
}

// 入场动画
setTimeout(() => document.getElementById('loader').classList.add('hidden'), 1200);

// 初始化
updateCounts();
renderSliders();
</script>
