<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
    <link rel="alternate icon" type="image/x-icon" href="/favicon.ico">
    <title>{% block title %}OpenCrawler{% endblock %}</title>
    <link rel="stylesheet" href="/static/product.css">
    <link rel="stylesheet" href="/static/animations.css">
    <link rel="stylesheet" href="/static/ai-assistant.css">
    <style>
    .gold-nav{color:#b45309 !important;font-weight:600}
    .gold-nav:hover{color:#92400e !important}
    .gold-nav.active{color:#92400e !important;border-bottom-color:#b45309 !important}

    /* 黑底白字质感按钮 */
    .nav-cta-gold{
        background:#1a1a1a;
        color:#fff !important;
        font-family:"YouYuan","幼圆","Microsoft YaHei",sans-serif;
        font-weight:700;
        font-size:14px;
        padding:8px 22px;
        border-radius:20px;
        border:1px solid #1a1a1a;
        box-shadow:0 2px 8px rgba(0,0,0,.12);
        letter-spacing:1px;
        transition:transform .2s var(--ease-spring),box-shadow .25s var(--ease-smooth),background .2s var(--ease-smooth),color .2s var(--ease-smooth);
        position:relative;
        overflow:hidden;
    }
    .nav-cta-gold:hover{
        text-decoration:none;
        transform:translateY(-2px);
        background:#fff;
        color:#1a1a1a !important;
        box-shadow:0 6px 20px rgba(0,0,0,.15);
    }
    .nav-cta-gold:active{transform:scale(.95)}

    /* 移动端汉堡菜单 */
    .nav-toggle{display:none;background:none;border:none;cursor:pointer;padding:6px;flex-direction:column;gap:4px;z-index:1001}
    .nav-toggle span{display:block;width:22px;height:2px;background:#1a1a1a;border-radius:2px;transition:all .3s ease}
    .nav-toggle.open span:nth-child(1){transform:translateY(6px) rotate(45deg)}
    .nav-toggle.open span:nth-child(2){opacity:0}
    .nav-toggle.open span:nth-child(3){transform:translateY(-6px) rotate(-45deg)}
    @media(max-width:768px){
        .nav-toggle{display:flex}
        .nav-links{
            position:fixed;top:0;right:-100%;width:75%;max-width:300px;height:100vh;
            background:#fff;flex-direction:column;gap:0;padding:80px 0 20px;
            box-shadow:-4px 0 24px rgba(0,0,0,.1);transition:right .3s ease;z-index:1000;overflow-y:auto
        }
        .nav-links.open{right:0}
        .nav-links a{padding:14px 24px;border-radius:0;border-bottom:1px solid #f0f0f0;font-size:15px}
        .nav-cta-gold{display:none}
        .navbar-inner{justify-content:space-between}
        .nav-backdrop{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:999}
        .nav-backdrop.open{display:block}
    }

    /* Page transition: fade + scale crossfade */
    .pt-overlay{position:fixed;inset:0;z-index:9999;background:#fff;opacity:0;pointer-events:none;transition:opacity .3s ease}
    .pt-overlay.pt-leave{opacity:1;pointer-events:auto}
    .pt-enter main{animation:ptFadeIn .45s cubic-bezier(.22,1,.36,1) both}
    @keyframes ptFadeIn{from{opacity:0;transform:scale(.98)}to{opacity:1;transform:none}}
    @keyframes shine{0%{background-position:-200% center}100%{background-position:200% center}}
    </style>
    {% block head %}{% endblock %}
</head>
<body>
    <div class="pt-overlay" id="ptOverlay"></div>
    <nav class="navbar">
        <div class="navbar-inner">
            <a href="/" class="nav-logo">
                <svg width="22" height="22" viewBox="0 0 64 64" style="flex-shrink:0">
                    <defs><linearGradient id="navlogo" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#1a1a1a"/><stop offset="100%" stop-color="#2d2d2d"/></linearGradient></defs>
                    <rect width="64" height="64" rx="14" fill="url(#navlogo)"/>
                    <circle cx="32" cy="32" r="20" fill="none" stroke="#d4af37" stroke-width="2.5" opacity="0.3"/>
                    <circle cx="32" cy="32" r="14" fill="none" stroke="#d4af37" stroke-width="2.5" opacity="0.5"/>
                    <circle cx="32" cy="32" r="8" fill="none" stroke="#d4af37" stroke-width="2.5" opacity="0.7"/>
                    <circle cx="32" cy="32" r="3" fill="#d4af37"/>
                    <path d="M32 12 L32 20 M32 44 L32 52 M12 32 L20 32 M44 32 L52 32" stroke="#d4af37" stroke-width="2.5" stroke-linecap="round" opacity="0.6"/>
                </svg>
                OpenCrawler
            </a>
            <div class="nav-links">
                <a href="/console" class="{% if active_page == 'console' %}active{% endif %}">资讯站</a>
                <a href="/platforms" class="{% if active_page == 'platforms' %}active{% endif %}">平台</a>
                <a href="/github" class="{% if active_page == 'github' %}active{% endif %}">GitHub</a>
                <a href="/finance" class="{% if active_page == 'finance' %}active{% endif %}">金融</a>
                <a href="/software" class="{% if active_page == 'software' %}active{% endif %}">软件站</a>
                <a href="/agent-deploy" class="{% if active_page == 'agent_deploy' %}active{% endif %} gold-nav">Agent部署</a>
                <a href="/script-market" class="{% if active_page == 'script_market' %}active{% endif %}">脚本市场</a>
                <a href="/ai-workflow" class="{% if active_page == 'ai_workflow' %}active{% endif %} gold-nav">AI工作流</a>
                <a href="/marketing" class="{% if active_page == 'marketing' %}active{% endif %} gold-nav">网络营销</a>
                <a href="/about" class="{% if active_page == 'about' %}active{% endif %} gold-nav">开发实践</a>
            </div>
            <a href="/console" class="nav-cta-gold">OpenCrawler</a>
            <button class="nav-toggle" id="navToggle" aria-label="菜单">
                <span></span><span></span><span></span>
            </button>
        </div>
    </nav>
    <div class="nav-backdrop" id="navBackdrop"></div>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        OpenCrawler &copy; 2026 — 抹平信息茧房 · 开发者资源站
    </footer>
    <script>
    // Page transition: fade-in on load
    (function(){
      var overlay = document.getElementById('ptOverlay');
      if (overlay) {
        overlay.classList.add('pt-leave');
        setTimeout(function(){ overlay.classList.remove('pt-leave'); }, 350);
      }
      document.body.classList.add('pt-enter');
    })();

    // Intercept internal nav links for exit transition
    document.addEventListener('click', function(e){
      var a = e.target.closest('a');
      if (!a) return;
      var href = a.getAttribute('href');
      if (!href || href.startsWith('#') || href.startsWith('http') || href.startsWith('//') || a.getAttribute('target')) return;
      if (a.dataset.notransition !== undefined) return;
      e.preventDefault();
      var overlay = document.getElementById('ptOverlay');
      if (overlay) {
        overlay.classList.add('pt-leave');
        var u = href;
        setTimeout(function(){ window.location = u; }, 300);
      } else {
        window.location = href;
      }
    });

    // 移动端汉堡菜单
    (function(){
      var toggle = document.getElementById('navToggle');
      var links = document.querySelector('.nav-links');
      var backdrop = document.getElementById('navBackdrop');
      function closeNav(){ toggle.classList.remove('open'); links.classList.remove('open'); backdrop.classList.remove('open'); }
      if (toggle) {
        toggle.addEventListener('click', function(){
          toggle.classList.toggle('open');
          links.classList.toggle('open');
          backdrop.classList.toggle('open');
        });
      }
      if (backdrop) backdrop.addEventListener('click', closeNav);
      if (links) links.addEventListener('click', function(e){ if (e.target.tagName === 'A') closeNav(); });
    })();
    </script>
    {% block scripts %}{% endblock %}
    <script src="/static/animations.js"></script>
    <script src="/static/ai-assistant.js"></script>
    <script src="/static/gh-avatars.js"></script>
    <script src="/static/hover-tooltip.js"></script>
</body>
</html>
