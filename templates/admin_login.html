<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
<title>Admin 登录 — 事件监视器</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0d1117;--card:#161b22;--border:#30363d;--text:#c9d1d9;--muted:#8b949e;
  --accent:#58a6ff;--green:#3fb950;--orange:#d2991d;--red:#f85149;
}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;align-items:center;justify-content:center}
.login-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:40px;width:380px;max-width:90vw}
.login-box h1{font-size:20px;font-weight:600;margin-bottom:8px;display:flex;align-items:center;gap:8px}
.login-box h1 .dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
.login-box .sub{font-size:13px;color:var(--muted);margin-bottom:24px}
.login-box label{display:block;font-size:12px;color:var(--muted);margin-bottom:6px;font-weight:500}
.login-box input{width:100%;background:var(--bg);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:8px;font-size:14px;font-family:inherit;transition:border-color .15s}
.login-box input:focus{outline:none;border-color:var(--accent)}
.login-box button{width:100%;margin-top:16px;background:var(--accent);color:#fff;border:none;padding:11px;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:opacity .15s}
.login-box button:hover{opacity:.85}
.login-box .error{color:var(--red);font-size:12px;margin-top:12px;text-align:center}
.login-box .back{display:block;text-align:center;margin-top:16px;font-size:12px;color:var(--muted);text-decoration:none}
.login-box .back:hover{color:var(--accent)}
</style>
</head>
<body>
<div class="login-box">
  <h1><span class="dot"></span> 事件监视器</h1>
  <p class="sub">请输入 Admin Key 以访问仪表盘</p>
  <form method="POST" action="/admin/login{% if request.args.get('next') %}?next={{ request.args.get('next') }}{% endif %}">
    <label for="admin_key">Admin Key</label>
    <input type="password" id="admin_key" name="admin_key" placeholder="sk-admin_..." autofocus required>
    <button type="submit">登录</button>
    {% if error %}<div class="error">{{ error }}</div>{% endif %}
  </form>
  <a href="/" class="back">← 返回首页</a>
</div>
</body>
</html>
