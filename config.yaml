    alipay_image: "/static/img/alipay_qr.png"
    wechat_image: "/static/img/wechat_qr.png"
  codepay:
    enabled: false
    api_url: ""
    app_id: ""
    app_secret: ""
  epay:
    enabled: false
    api_url: ""
    pid: ""
    key: ""
  admin_contact: "your-email@example.com"
