# NVD CVE 漏洞（官方 API）
nvd_cve:
  enabled: true
  days_back: 7
  max_results: 20

# 短视频热门（B站/抖音/快手/小红书/视频号）
shortvideo_trending:
  enabled: true
  max_per_platform: 20  # 每个平台最大抓取条数

# 金融数据（A股热门股票/板块/指数，含红率/股息率）
finance_data:
  enabled: true
  max_stocks: 50  # 最大抓取股票数量

