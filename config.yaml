# ============================================================
# 统一事件监视器 配置文件
# ============================================================

# 代理设置（Clash 默认 7890，留空则不使用代理）
proxy: ""

# 数据保留天数（超过自动清理）
retention_days: 30

# 各源抓取间隔（分钟）
intervals:
  github_trending: 60
  hackernews: 30
  rss: 30
  curl_cffi_rss: 30
  nvd_cve: 120
  shortvideo_trending: 60
  finance_data: 1440  # 每日抓取一次

# ---- 监控源配置 ----

# GitHub Trending 榜单（直接爬取）
github_trending:
  enabled: true
  languages: [""]
  since: ["daily", "weekly"]
  spoken_language: ""

# Hacker News（官方 API）
hackernews:
  enabled: true
  max_items: 30

